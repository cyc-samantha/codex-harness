name: harness-gate

# CX-54 — CI-Green merge gate. Runs the enforcement-hook test suite on any PR
# that touches the enforcement surface. Dependency-light: ubuntu-latest + bats
# (from apt) + jq + git, no language toolchain.

# Push trigger is deliberately UNFILTERED (no `paths:`) — a path-filtered
# push would silently skip runs on main commits that touch only
# non-listed files, defeating "every push to main runs the gate". The
# job is sub-minute, so unfiltered-on-main is cheap and correct. Path
# filters stay on `pull_request` only — do not add `paths:` here.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".codex/hooks/**"
      - ".codex/rules/**"
      - ".agents/skills/**"
      - "tests/shell/**"
      - ".github/workflows/harness-gate.yml"
      - "scripts/**"
      - "AGENTS.md"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats, jq, and shellcheck
        run: sudo apt-get update && sudo apt-get install -y bats jq shellcheck

      - name: Verify hooks.json is valid JSON
        run: jq -e . .codex/hooks/hooks.json > /dev/null

      - name: Lint shell sources
        run: shellcheck --severity=error .codex/hooks/*.sh .codex/hooks/_lib/*.sh scripts/*.sh

      - name: Run enforcement-hook test suite
        run: bats tests/shell/
